<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘境旅行 - 发现小众旅游好去处</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">&#127757; 秘境旅行</a>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions">
            <a href="login.html" class="btn btn-outline">登录</a>
            <a href="register.html" class="btn btn-primary">注册</a>
        </div>
    </nav>

    <div class="filter-bar">
        <select id="filterCategory">
            <option value="">全部类型</option>
            <option value="小众景点">小众景点</option>
            <option value="大众景点的小众去处">大众景点的小众去处</option>
            <option value="避峰攻略">避峰攻略</option>
        </select>
        <select id="filterRegion">
            <option value="">全部地区</option>
            <option value="华东">华东</option>
            <option value="华南">华南</option>
            <option value="华北">华北</option>
            <option value="西南">西南</option>
            <option value="西北">西北</option>
            <option value="东北">东北</option>
            <option value="华中">华中</option>
        </select>
        <select id="filterSeason">
            <option value="">全部季节</option>
            <option value="春季">春季</option>
            <option value="夏季">夏季</option>
            <option value="秋季">秋季</option>
            <option value="冬季">冬季</option>
            <option value="四季皆宜">四季皆宜</option>
        </select>
    </div>

    <div class="container">
        <div class="post-grid" id="postGrid">
            <!-- Posts loaded dynamically -->
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <p>还没有帖子，来分享你的秘境发现吧</p>
            <a href="create.html" class="btn btn-primary">发布第一篇</a>
        </div>
    </div>

    <footer class="footer">
        <p>秘境旅行 - 发现不一样的风景 | 避开人潮，遇见美好</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
