<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>别处游 - 发现小众旅游好去处</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions">
            <a href="login.html" class="btn btn-outline">登录</a>
            <a href="register.html" class="btn btn-primary">注册</a>
        </div>
    </nav>

    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </button>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-clock" id="heroClock"></div>
            <h1 class="hero-title">去别处，遇见不同</h1>
            <p class="hero-subtitle">避开人潮，发现属于你的风景</p>
            <a href="create.html" class="btn btn-primary hero-cta">分享你的发现</a>
        </div>
    </section>

    <section class="photo-wall">
        <div class="checkin-panel" id="checkinPanel">
            <h3>每日签到</h3>
            <p class="checkin-streak">已连续签到 <span id="streakCount">0</span> 天</p>
            <button class="btn btn-primary checkin-btn" id="checkinBtn" onclick="doCheckin()">签到领卡</button>
            <p class="checkin-hint">连签3天额外+1次抽卡</p>
            <p class="checkin-draws">可用抽卡: <span id="availableDraws">0</span> 次</p>
        </div>
        <div class="carousel-ad">
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-slide active">
                    <div class="ad-placeholder">
                        <p class="ad-text">广告位招租</p>
                        <p class="ad-contact">联系微信：l122625861</p>
                    </div>
                </div>
                <div class="carousel-slide">
                    <div class="ad-placeholder">
                        <p class="ad-text">广告位招租</p>
                        <p class="ad-contact">联系微信：l122625861</p>
                    </div>
                </div>
                <div class="carousel-slide">
                    <div class="ad-placeholder">
                        <p class="ad-text">广告位招租</p>
                        <p class="ad-contact">联系微信：l122625861</p>
                    </div>
                </div>
            </div>
            <div class="carousel-dots">
                <span class="carousel-dot active" onclick="goToSlide(0)"></span>
                <span class="carousel-dot" onclick="goToSlide(1)"></span>
                <span class="carousel-dot" onclick="goToSlide(2)"></span>
            </div>
            <button class="carousel-btn carousel-prev" onclick="prevSlide()">&#10094;</button>
            <button class="carousel-btn carousel-next" onclick="nextSlide()">&#10095;</button>
        </div>
        <div class="activity-panel">
            <a href="activity.html" class="activity-link">
                <div class="activity-card">
                    <div class="activity-icon">&#127183;</div>
                    <h3>集卡大赛</h3>
                    <p>收集城市卡，解锁省章国章</p>
                    <span class="activity-arrow">&rarr;</span>
                </div>
            </a>
        </div>
    </section>

    <div class="card-draw-modal" id="cardDrawModal" style="display:none;">
        <div class="card-draw-content">
            <div class="flip-card" id="flipCard" onclick="flipTheCard()">
                <div class="flip-card-inner" id="flipCardInner">
                    <div class="flip-card-front">?</div>
                    <div class="flip-card-back">
                        <p class="drawn-city" id="drawnCity"></p>
                        <p class="drawn-province" id="drawnProvince"></p>
                    </div>
                </div>
            </div>
            <p class="draw-result-hint" id="drawResultHint">点击卡片翻转</p>
            <button class="btn btn-primary" id="closeDrawBtn" style="display:none;" onclick="closeDrawModal()">收下</button>
        </div>
    </div>

    <div class="main-layout">
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <button class="sidebar-btn active" id="btnPosts" onclick="switchView('posts')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>浏览帖子</span>
                </button>
                <a class="sidebar-btn" href="friends.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>好友</span>
                </a>
                <a class="sidebar-btn" href="chat.html" style="position:relative;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>私信</span>
                    <span class="badge" id="badgeMessages" style="display:none;"></span>
                </a>
                <a class="sidebar-btn" href="inbox.html" style="position:relative;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <span>邮箱</span>
                    <span class="badge" id="badgeNotifications" style="display:none;"></span>
                </a>
                <button class="sidebar-btn" id="btnMap" onclick="switchView('map')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16"/><path d="M16 6v16"/></svg>
                    <span>中国地图</span>
                </button>
                <a class="sidebar-btn" href="create.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>发布推荐</span>
                </a>
            </nav>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <main class="main-content">
            <div id="viewPosts">
                <div class="filter-bar">
                    <select id="filterCategory">
                        <option value="">全部类型</option>
                        <option value="小众景点">小众景点</option>
                        <option value="大众景点的小众去处">大众景点的小众去处</option>
                        <option value="避峰攻略">避峰攻略</option>
                    </select>
                    <select id="filterRegion">
                        <option value="">全部地区</option>
                        <option value="华东">华东</option>
                        <option value="华南">华南</option>
                        <option value="华北">华北</option>
                        <option value="西南">西南</option>
                        <option value="西北">西北</option>
                        <option value="东北">东北</option>
                        <option value="华中">华中</option>
                    </select>
                    <select id="filterSeason">
                        <option value="">全部季节</option>
                        <option value="春季">春季</option>
                        <option value="夏季">夏季</option>
                        <option value="秋季">秋季</option>
                        <option value="冬季">冬季</option>
                        <option value="四季皆宜">四季皆宜</option>
                    </select>
                    <select id="filterSort">
                        <option value="time">最新发布</option>
                        <option value="likes">最多点赞</option>
                        <option value="favorites">最多收藏</option>
                        <option value="comments">最多评论</option>
                    </select>
                </div>
                <div class="container">
                    <div class="post-grid" id="postGrid"></div>
                    <div class="empty-state" id="emptyState" style="display:none;">
                        <p>还没有帖子，来分享你的发现吧</p>
                        <a href="create.html" class="btn btn-primary">发布第一篇</a>
                    </div>
                </div>
            </div>

            <div id="viewMap" style="display:none;">
                <div class="map-header">
                    <h2>中国旅行地图</h2>
                    <p>点击省份查看当地帖子</p>
                </div>
                <div class="map-container" id="mapContainer"></div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>别处游 - 去别处，遇见不同 | 避开人潮，遇见美好</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/china-map.js" defer></script>
    <script src="js/app.js"></script>
</body>
</html>
