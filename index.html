<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>别处游 - 发现小众旅游好去处</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions">
            <a href="login.html" class="btn btn-outline">登录</a>
            <a href="register.html" class="btn btn-primary">注册</a>
        </div>
    </nav>

    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </button>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">去别处，遇见不同</h1>
            <p class="hero-subtitle">避开人潮，发现属于你的风景</p>
            <a href="create.html" class="btn btn-primary hero-cta">分享你的发现</a>
        </div>
    </section>

    <section class="photo-wall">
        <div class="photo-frame" style="--rotate: -4deg; --delay: 0s;">
            <img src="https://images.unsplash.com/photo-1501555088652-021faa106b9b?w=200&h=200&fit=crop&crop=faces" alt="旅行者" loading="lazy">
            <span class="frame-label">探索世界</span>
        </div>
        <div class="photo-frame" style="--rotate: 3deg; --delay: 0.1s;">
            <img src="https://images.unsplash.com/photo-1551655510-555dc3be8633?w=200&h=200&fit=crop&crop=faces" alt="一家三口" loading="lazy">
            <span class="frame-label">亲子时光</span>
        </div>
        <div class="photo-frame" style="--rotate: -2deg; --delay: 0.2s;">
            <img src="https://images.unsplash.com/photo-1527631746610-bca00a040d60?w=200&h=200&fit=crop&crop=faces" alt="旅行女生" loading="lazy">
            <span class="frame-label">说走就走</span>
        </div>
        <div class="photo-frame" style="--rotate: 5deg; --delay: 0.3s;">
            <img src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=200&h=200&fit=crop" alt="老夫妻" loading="lazy">
            <span class="frame-label">相伴一生</span>
        </div>
        <div class="photo-frame" style="--rotate: -3deg; --delay: 0.4s;">
            <img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=200&h=200&fit=crop&crop=faces" alt="小朋友" loading="lazy">
            <span class="frame-label">快乐童年</span>
        </div>
        <div class="photo-frame" style="--rotate: 2deg; --delay: 0.5s;">
            <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=200&h=200&fit=crop" alt="旅途风景" loading="lazy">
            <span class="frame-label">在路上</span>
        </div>
    </section>

    <div class="main-layout">
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <button class="sidebar-btn active" id="btnPosts" onclick="switchView('posts')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>浏览帖子</span>
                </button>
                <a class="sidebar-btn" href="search.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>搜索</span>
                </a>
                <button class="sidebar-btn" id="btnMap" onclick="switchView('map')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16"/><path d="M16 6v16"/></svg>
                    <span>中国地图</span>
                </button>
                <a class="sidebar-btn" href="create.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>发布推荐</span>
                </a>
                <a class="sidebar-btn" href="profile.html" id="btnProfile">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>个人中心</span>
                </a>
            </nav>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <main class="main-content">
            <div id="viewPosts">
                <div class="filter-bar">
                    <select id="filterCategory">
                        <option value="">全部类型</option>
                        <option value="小众景点">小众景点</option>
                        <option value="大众景点的小众去处">大众景点的小众去处</option>
                        <option value="避峰攻略">避峰攻略</option>
                    </select>
                    <select id="filterRegion">
                        <option value="">全部地区</option>
                        <option value="华东">华东</option>
                        <option value="华南">华南</option>
                        <option value="华北">华北</option>
                        <option value="西南">西南</option>
                        <option value="西北">西北</option>
                        <option value="东北">东北</option>
                        <option value="华中">华中</option>
                    </select>
                    <select id="filterSeason">
                        <option value="">全部季节</option>
                        <option value="春季">春季</option>
                        <option value="夏季">夏季</option>
                        <option value="秋季">秋季</option>
                        <option value="冬季">冬季</option>
                        <option value="四季皆宜">四季皆宜</option>
                    </select>
                </div>
                <div class="container">
                    <div class="post-grid" id="postGrid"></div>
                    <div class="empty-state" id="emptyState" style="display:none;">
                        <p>还没有帖子，来分享你的发现吧</p>
                        <a href="create.html" class="btn btn-primary">发布第一篇</a>
                    </div>
                </div>
            </div>

            <div id="viewMap" style="display:none;">
                <div class="map-header">
                    <h2>中国旅行地图</h2>
                    <p>点击省份查看当地帖子</p>
                </div>
                <div class="map-container" id="mapContainer"></div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>别处游 - 去别处，遇见不同 | 避开人潮，遇见美好</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/china-map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
