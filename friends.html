<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好友 - 别处游</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <div class="friends-page">
        <div class="friends-search">
            <h3>添加好友</h3>
            <div class="search-input-group">
                <input type="text" id="searchUserInput" placeholder="输入用户名搜索...">
                <button class="btn btn-primary" onclick="searchUsers()">搜索</button>
            </div>
            <div id="searchResults" class="search-results-list"></div>
        </div>

        <div class="friends-list-section">
            <h3>我的好友</h3>
            <div id="friendsList" class="friends-list"></div>
            <div class="empty-state" id="emptyFriends" style="display:none;">
                <p>还没有好友，搜索用户添加吧</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) {
            showToast('请先登录', 'error');
            setTimeout(() => window.location.href = 'login.html', 1000);
        }
        Auth.updateNav();

        function defaultAvatar(username) {
            const ch = username ? username[0].toUpperCase() : 'U';
            return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23E8F6F8" width="100" height="100"/><text x="50" y="65" font-size="40" text-anchor="middle" fill="%231B5E6B">' + ch + '</text></svg>';
        }

        async function searchUsers() {
            const q = document.getElementById('searchUserInput').value.trim();
            if (!q) return;
            try {
                const users = await API.searchUsers(q);
                const container = document.getElementById('searchResults');
                if (users.length === 0) {
                    container.innerHTML = '<p class="no-result">未找到用户</p>';
                    return;
                }
                container.innerHTML = users.map(u => `
                    <div class="friend-card">
                        <img class="friend-avatar" src="${u.avatar || defaultAvatar(u.username)}" alt="">
                        <div class="friend-info">
                            <span class="friend-name">${escapeHtml(u.nickname || u.username)}</span>
                            <span class="friend-username">@${escapeHtml(u.username)}</span>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="addFriend(${u.id})">添加好友</button>
                    </div>
                `).join('');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        document.getElementById('searchUserInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchUsers();
        });

        async function addFriend(userId) {
            try {
                const res = await API.sendFriendRequest(userId);
                showToast(res.message, 'success');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function loadFriends() {
            try {
                const friends = await API.getFriends();
                const list = document.getElementById('friendsList');
                const empty = document.getElementById('emptyFriends');
                if (friends.length === 0) {
                    list.style.display = 'none';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                list.style.display = '';
                list.innerHTML = friends.map(f => `
                    <div class="friend-card">
                        <img class="friend-avatar" src="${f.avatar || defaultAvatar(f.username)}" alt="">
                        <div class="friend-info">
                            <span class="friend-name">${escapeHtml(f.nickname || f.username)}</span>
                            <span class="friend-username">@${escapeHtml(f.username)}</span>
                        </div>
                        <button class="btn btn-outline btn-sm" onclick="window.location.href='chat.html?user=${f.id}'">发消息</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadFriends();
    </script>
</body>
</html>
