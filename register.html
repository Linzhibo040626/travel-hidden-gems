<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 别处游</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-outline">登录</a>
        </div>
    </nav>

    <div class="auth-container">
        <h2>加入别处游</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名（2-20个字符）" minlength="2" maxlength="20">
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" name="phone" required placeholder="请输入手机号" maxlength="11" pattern="1[3-9]\d{9}">
            </div>
            <div class="form-group">
                <label for="smsCode">验证码</label>
                <div class="sms-input-group">
                    <input type="text" id="smsCode" name="smsCode" required placeholder="请输入验证码" maxlength="6">
                    <button type="button" class="btn btn-outline sms-btn" id="sendSmsBtn" onclick="sendSms()">获取验证码</button>
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码（至少6位）" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入密码">
            </div>
            <button type="submit" class="btn btn-primary">注册</button>
        </form>
        <p class="auth-link">已有账号？<a href="login.html">立即登录</a></p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let smsCountdown = 0;

        async function sendSms() {
            const phone = document.getElementById('phone').value.trim();
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }
            const btn = document.getElementById('sendSmsBtn');
            btn.disabled = true;
            try {
                await API.sendSmsCode(phone);
                showToast('验证码已发送', 'success');
                smsCountdown = 60;
                btn.textContent = smsCountdown + '秒后重发';
                const timer = setInterval(() => {
                    smsCountdown--;
                    if (smsCountdown <= 0) {
                        clearInterval(timer);
                        btn.textContent = '获取验证码';
                        btn.disabled = false;
                    } else {
                        btn.textContent = smsCountdown + '秒后重发';
                    }
                }, 1000);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('smsCode').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !password || !phone || !code) {
                showToast('请填写所有必填项', 'error');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showToast('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('密码至少需要6位', 'error');
                return;
            }

            try {
                await Auth.register(username, password, phone, code);
                showToast('注册成功，即将跳转登录', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
