<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 别处游</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <img id="avatarImg" src="" alt="头像">
                    <label class="avatar-upload" for="avatarFile">更换头像</label>
                    <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="handleAvatarChange(event)">
                </div>
                <div class="profile-info">
                    <h2 id="profileUsername"></h2>
                    <p class="profile-signature" id="profileSignature">这个人很懒，什么都没写~</p>
                </div>
            </div>
            <div class="profile-details">
                <form id="profileForm">
                    <div class="form-group">
                        <label for="profileNickname">用户名（昵称）</label>
                        <input type="text" id="profileNickname" placeholder="设置你的用户名" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label>绑定手机</label>
                        <input type="text" id="profilePhone" disabled style="background:var(--bg-elevated);cursor:not-allowed;">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="profileQQ">QQ号</label>
                            <input type="text" id="profileQQ" placeholder="请输入QQ号">
                        </div>
                        <div class="form-group">
                            <label for="profileGender">性别</label>
                            <select id="profileGender">
                                <option value="">未设置</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                                <option value="保密">保密</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="profileSig">个人签名</label>
                        <input type="text" id="profileSig" placeholder="写一句话介绍自己" maxlength="50">
                    </div>
                    <button type="submit" class="btn btn-primary">保存资料</button>
                </form>
            </div>
        </div>

        <div class="profile-posts">
            <h3>我的帖子</h3>
            <div id="myPostsList"></div>
            <div class="empty-state" id="emptyPosts" style="display:none;">
                <p>你还没有发布过帖子</p>
                <a href="create.html" class="btn btn-primary">去发布</a>
            </div>
        </div>

        <div class="profile-logout">
            <button class="btn btn-outline btn-logout" onclick="Auth.logout()">退出登录</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) {
            showToast('请先登录', 'error');
            setTimeout(() => window.location.href = 'login.html', 1000);
        }
        Auth.updateNav();

        let avatarData = '';

        function showCachedProfile() {
            const cached = localStorage.getItem('profileCache');
            const user = Auth.getUser();
            if (cached) {
                const p = JSON.parse(cached);
                document.getElementById('profileUsername').textContent = p.nickname || p.username || '';
                document.getElementById('profileNickname').value = p.nickname || '';
                document.getElementById('profileQQ').value = p.qq || '';
                document.getElementById('profileGender').value = p.gender || '';
                document.getElementById('profileSig').value = p.signature || '';
                document.getElementById('profileSignature').textContent = p.signature || '这个人很懒，什么都没写~';
                document.getElementById('profilePhone').value = maskPhone(p.phone);
                if (p.avatar) {
                    document.getElementById('avatarImg').src = p.avatar;
                } else {
                    document.getElementById('avatarImg').src = defaultAvatar(p.username);
                }
            } else if (user) {
                document.getElementById('profileUsername').textContent = user.nickname || user.username || '';
                document.getElementById('avatarImg').src = defaultAvatar(user.username);
                document.getElementById('profilePhone').value = maskPhone(user.phone);
            }
        }

        function maskPhone(phone) {
            if (!phone || phone.length < 11) return '未绑定';
            return phone.slice(0, 3) + '****' + phone.slice(7);
        }

        function defaultAvatar(username) {
            const ch = username ? username[0].toUpperCase() : 'U';
            return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23E8F6F8" width="100" height="100"/><text x="50" y="65" font-size="40" text-anchor="middle" fill="%231B5E6B">' + ch + '</text></svg>';
        }

        async function loadProfile() {
            try {
                const profile = await API.getProfile();
                localStorage.setItem('profileCache', JSON.stringify(profile));
                document.getElementById('profileUsername').textContent = profile.nickname || profile.username;
                document.getElementById('profileNickname').value = profile.nickname || '';
                document.getElementById('profileQQ').value = profile.qq || '';
                document.getElementById('profileGender').value = profile.gender || '';
                document.getElementById('profileSig').value = profile.signature || '';
                document.getElementById('profileSignature').textContent = profile.signature || '这个人很懒，什么都没写~';
                document.getElementById('profilePhone').value = maskPhone(profile.phone);
                if (profile.avatar) {
                    document.getElementById('avatarImg').src = profile.avatar;
                } else {
                    document.getElementById('avatarImg').src = defaultAvatar(profile.username);
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function loadMyPosts() {
            try {
                const posts = await API.getMyPosts();
                const list = document.getElementById('myPostsList');
                const empty = document.getElementById('emptyPosts');

                if (posts.length === 0) {
                    list.style.display = 'none';
                    empty.style.display = 'block';
                    return;
                }

                list.innerHTML = posts.map(post => `
                    <div class="my-post-item">
                        <div class="my-post-info" onclick="window.location.href='post.html?id=${post.id}'">
                            <h4>${escapeHtml(post.title)}</h4>
                            <div class="my-post-meta">
                                <span>&#128205; ${escapeHtml(post.location)}</span>
                                <span>&#10084; ${post.likes_count || 0}</span>
                                <span>${formatTime(post.created_at)}</span>
                            </div>
                        </div>
                        <div style="display:flex;gap:8px;flex-shrink:0;margin-left:12px;">
                            <button class="btn-edit" onclick="window.location.href='post.html?id=${post.id}&edit=1'">编辑</button>
                            <button class="btn-delete" onclick="deletePost(${post.id})">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function handleAvatarChange(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showToast('头像图片不能超过 2MB', 'error');
                event.target.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                avatarData = e.target.result;
                document.getElementById('avatarImg').src = avatarData;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nickname: document.getElementById('profileNickname').value.trim(),
                qq: document.getElementById('profileQQ').value.trim(),
                gender: document.getElementById('profileGender').value,
                signature: document.getElementById('profileSig').value.trim()
            };
            if (avatarData) {
                data.avatar = avatarData;
            }
            try {
                await API.updateProfile(data);
                showToast('资料保存成功', 'success');
                document.getElementById('profileSignature').textContent = data.signature || '这个人很懒，什么都没写~';
                document.getElementById('profileUsername').textContent = data.nickname || '旅行者';
                const stored = Auth.getUser();
                if (stored) {
                    stored.nickname = data.nickname;
                    localStorage.setItem('user', JSON.stringify(stored));
                }
                const cached = JSON.parse(localStorage.getItem('profileCache') || '{}');
                Object.assign(cached, data);
                localStorage.setItem('profileCache', JSON.stringify(cached));
                Auth.updateNav();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        async function deletePost(postId) {
            if (!confirm('确定要删除这篇帖子吗？')) return;
            try {
                await API.deletePost(postId);
                showToast('删除成功', 'success');
                loadMyPosts();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        showCachedProfile();
        loadProfile();
        loadMyPosts();
    </script>
</body>
</html>
