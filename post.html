<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 别处游</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <div class="post-detail" id="postDetail">
        <!-- Loaded dynamically -->
    </div>

    <div class="edit-modal" id="editModal" style="display:none;">
        <div class="edit-modal-content">
            <h3>编辑帖子</h3>
            <form id="editForm">
                <div class="form-group">
                    <label for="editTitle">标题</label>
                    <input type="text" id="editTitle" required maxlength="50">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editLocation">地点</label>
                        <input type="text" id="editLocation" required>
                    </div>
                    <div class="form-group">
                        <label for="editCategory">分类</label>
                        <select id="editCategory" required>
                            <option value="小众景点">小众景点</option>
                            <option value="大众景点的小众去处">大众景点的小众去处</option>
                            <option value="避峰攻略">避峰攻略</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editProvince">省份</label>
                        <select id="editProvince" required>
                            <option value="">请选择省份</option>
                            <option value="北京">北京</option>
                            <option value="天津">天津</option>
                            <option value="上海">上海</option>
                            <option value="重庆">重庆</option>
                            <option value="河北">河北</option>
                            <option value="山西">山西</option>
                            <option value="辽宁">辽宁</option>
                            <option value="吉林">吉林</option>
                            <option value="黑龙江">黑龙江</option>
                            <option value="江苏">江苏</option>
                            <option value="浙江">浙江</option>
                            <option value="安徽">安徽</option>
                            <option value="福建">福建</option>
                            <option value="江西">江西</option>
                            <option value="山东">山东</option>
                            <option value="河南">河南</option>
                            <option value="湖北">湖北</option>
                            <option value="湖南">湖南</option>
                            <option value="广东">广东</option>
                            <option value="广西">广西</option>
                            <option value="海南">海南</option>
                            <option value="四川">四川</option>
                            <option value="贵州">贵州</option>
                            <option value="云南">云南</option>
                            <option value="西藏">西藏</option>
                            <option value="陕西">陕西</option>
                            <option value="甘肃">甘肃</option>
                            <option value="青海">青海</option>
                            <option value="宁夏">宁夏</option>
                            <option value="新疆">新疆</option>
                            <option value="内蒙古">内蒙古</option>
                            <option value="台湾">台湾</option>
                            <option value="香港">香港</option>
                            <option value="澳门">澳门</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editSeason">适合季节</label>
                        <select id="editSeason">
                            <option value="">未选择</option>
                            <option value="春季">春季</option>
                            <option value="夏季">夏季</option>
                            <option value="秋季">秋季</option>
                            <option value="冬季">冬季</option>
                            <option value="四季皆宜">四季皆宜</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>图片</label>
                    <input type="file" id="editImageFile" accept="image/*" multiple onchange="handleEditFileSelect(event)">
                    <div class="image-preview-list" id="editImagePreviewList"></div>
                </div>
                <div class="form-group">
                    <label>详细介绍</label>
                    <div class="content-block-editor" id="editBlockEditor">
                    </div>
                </div>
                <div style="display:flex;gap:12px;">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <button type="button" class="btn btn-outline" onclick="closeEditModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div class="comments-section" id="commentsSection">
        <h3>评论</h3>
        <div class="comment-form" id="commentForm" style="display:none;">
            <div class="comment-reply-hint" id="replyHint" style="display:none;">
                <span id="replyHintText"></span>
                <button onclick="cancelReply()">&#10005;</button>
            </div>
            <div class="comment-input-row">
                <input type="text" id="commentInput" placeholder="写下你的评论...">
                <label class="comment-image-btn" title="添加图片">
                    &#128247;
                    <input type="file" accept="image/*" id="commentImageInput" onchange="handleCommentImage(this)" style="display:none;">
                </label>
                <button class="btn btn-primary" id="commentBtn">发表</button>
            </div>
            <div class="comment-image-preview" id="commentImagePreview"></div>
        </div>
        <div id="commentsList"></div>
    </div>

    <footer class="footer">
        <p>别处游 - 去别处，遇见不同</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        Auth.updateNav();

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            window.location.href = 'index.html';
        }

        let currentPost = null;
        let editImages = [];

        function getPostImages(post) {
            if (!post.image_url) return [];
            try {
                const parsed = JSON.parse(post.image_url);
                if (Array.isArray(parsed)) return parsed;
            } catch {}
            return [post.image_url];
        }

        async function loadPost() {
            try {
                currentPost = await API.getPost(postId);
                renderPost(currentPost);
                initCarouselTouch();
                loadComments();
                if (urlParams.get('edit') === '1') {
                    const user = Auth.getUser();
                    if (user && user.id === currentPost.user_id) {
                        openEditModal();
                    }
                }
            } catch (err) {
                showToast('加载失败', 'error');
            }
        }

        function renderContent(content) {
            try {
                const blocks = JSON.parse(content);
                if (Array.isArray(blocks)) {
                    return blocks.map(b => {
                        if (b.type === 'image') return `<img class="post-content-image" src="${escapeHtml(b.value)}" alt="正文图片">`;
                        return `<p>${escapeHtml(b.value)}</p>`;
                    }).join('');
                }
            } catch {}
            return `<p>${escapeHtml(content)}</p>`;
        }

        function renderPost(post) {
            const detail = document.getElementById('postDetail');
            const images = getPostImages(post);
            let imageHtml = '';
            if (images.length > 1) {
                imageHtml = `
                    <div class="image-carousel">
                        <div class="carousel-track" id="carouselTrack">
                            ${images.map((img, i) => `<img class="carousel-slide" src="${escapeHtml(img)}" alt="图片${i+1}">`).join('')}
                        </div>
                        <button class="carousel-btn carousel-prev" onclick="carouselMove(-1)">&#10094;</button>
                        <button class="carousel-btn carousel-next" onclick="carouselMove(1)">&#10095;</button>
                        <div class="carousel-dots">
                            ${images.map((_, i) => `<span class="carousel-dot ${i===0?'active':''}" onclick="carouselGo(${i})"></span>`).join('')}
                        </div>
                    </div>`;
            } else if (images.length === 1) {
                imageHtml = `<img class="post-detail-image" src="${escapeHtml(images[0])}" alt="${escapeHtml(post.title)}">`;
            }

            const user = Auth.getUser();
            const isOwner = user && user.id === post.user_id;
            const editBtn = isOwner ? `<button class="btn btn-outline" onclick="openEditModal()">编辑</button>` : '';

            detail.innerHTML = `
                ${imageHtml}
                <div class="post-detail-body">
                    <h1 class="post-detail-title">${escapeHtml(post.title)}</h1>
                    <div class="post-detail-info">
                        <span>&#128205; ${escapeHtml(post.location)}</span>
                        <span>&#128196; ${escapeHtml(post.category)}</span>
                        <span>&#127759; ${escapeHtml(post.region || '')}</span>
                        ${post.season ? `<span>&#127808; ${escapeHtml(post.season)}</span>` : ''}
                        <span>&#128100; ${escapeHtml(post.nickname || '匿名')}</span>
                        <span>${formatTime(post.created_at)}</span>
                    </div>
                    <div class="post-detail-content">${renderContent(post.content)}</div>
                    <div class="post-actions">
                        <button class="like-btn ${post.user_liked ? 'liked' : ''}" id="likeBtn" onclick="toggleLike()">
                            &#10084; <span id="likeCount">${post.likes_count || 0}</span>
                        </button>
                        <button class="favorite-btn ${post.user_favorited ? 'favorited' : ''}" id="favBtn" onclick="toggleFavorite()">
                            &#9733; <span id="favCount">${post.favorites_count || 0}</span>
                        </button>
                        <button class="share-btn" onclick="sharePost()">
                            &#128279; 转发
                        </button>
                        ${editBtn}
                    </div>
                </div>
            `;
        }

        let carouselIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;

        function carouselMove(dir) {
            const images = getPostImages(currentPost);
            carouselIndex = (carouselIndex + dir + images.length) % images.length;
            updateCarousel();
        }
        function carouselGo(index) {
            carouselIndex = index;
            updateCarousel();
        }
        function updateCarousel() {
            const track = document.getElementById('carouselTrack');
            if (!track) return;
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === carouselIndex);
            });
        }
        function initCarouselTouch() {
            const track = document.getElementById('carouselTrack');
            if (!track) return;
            track.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
            track.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    carouselMove(diff > 0 ? 1 : -1);
                }
            });
        }

        async function toggleLike() {
            if (!Auth.isLoggedIn()) {
                showToast('请先登录', 'error');
                return;
            }
            try {
                const result = await API.toggleLike(postId);
                const btn = document.getElementById('likeBtn');
                const count = document.getElementById('likeCount');
                if (result.liked) {
                    btn.classList.add('liked');
                } else {
                    btn.classList.remove('liked');
                }
                count.textContent = result.likes_count;
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function toggleFavorite() {
            if (!Auth.isLoggedIn()) {
                showToast('请先登录', 'error');
                return;
            }
            try {
                const result = await API.toggleFavorite(postId);
                const btn = document.getElementById('favBtn');
                const count = document.getElementById('favCount');
                if (result.favorited) {
                    btn.classList.add('favorited');
                } else {
                    btn.classList.remove('favorited');
                }
                count.textContent = result.favorites_count;
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function sharePost() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    showToast('链接已复制', 'success');
                });
            } else {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('链接已复制', 'success');
            }
        }

        function openEditModal() {
            if (!currentPost) return;
            document.getElementById('editTitle').value = currentPost.title;
            document.getElementById('editLocation').value = currentPost.location;
            document.getElementById('editCategory').value = currentPost.category;
            document.getElementById('editProvince').value = currentPost.region || '';
            document.getElementById('editSeason').value = currentPost.season || '';
            editImages = getPostImages(currentPost).slice();
            renderEditPreviews();
            initEditBlockEditor(currentPost.content);
            document.getElementById('editModal').style.display = 'flex';
        }

        function initEditBlockEditor(content) {
            const editor = document.getElementById('editBlockEditor');
            let blocks = [];
            try {
                const parsed = JSON.parse(content);
                if (Array.isArray(parsed)) blocks = parsed;
            } catch {}
            if (blocks.length === 0) {
                blocks = [{ type: 'text', value: content || '' }];
            }
            editor.innerHTML = '';
            blocks.forEach((b, i) => {
                if (b.type === 'image') {
                    editor.appendChild(createEditImageBlock(b.value));
                } else {
                    editor.appendChild(createEditTextBlock(b.value, true));
                }
            });
            const lastBlock = editor.lastElementChild;
            if (!lastBlock || lastBlock.dataset.type !== 'text') {
                editor.appendChild(createEditTextBlock('', true));
            }
        }

        function createEditTextBlock(value, withBtn) {
            const div = document.createElement('div');
            div.className = 'content-block';
            div.dataset.type = 'text';
            div.innerHTML = `
                <textarea placeholder="输入文字..." rows="4">${escapeHtml(value)}</textarea>
                <button type="button" class="insert-image-btn" onclick="insertEditImageBlock(this)">+ 插入图片</button>
            `;
            return div;
        }

        function createEditImageBlock(src) {
            const div = document.createElement('div');
            div.className = 'content-block';
            div.dataset.type = 'image';
            div.innerHTML = `
                <div class="block-image-upload">
                    <input type="file" accept="image/*" onchange="handleEditBlockImage(this)" ${src ? 'style="display:none;"' : ''}>
                    <div class="block-image-preview" ${src ? `data-src="${escapeHtml(src)}"` : ''}>${src ? `<img src="${escapeHtml(src)}" alt="预览">` : ''}</div>
                </div>
                <button type="button" class="block-remove-btn" onclick="removeEditBlock(this)">删除图片</button>
            `;
            return div;
        }

        function insertEditImageBlock(btn) {
            const currentBlock = btn.closest('.content-block');
            const editor = document.getElementById('editBlockEditor');
            const imgBlock = createEditImageBlock('');
            imgBlock.querySelector('input[type="file"]').style.display = '';
            const textBlock = createEditTextBlock('', true);
            currentBlock.after(imgBlock);
            imgBlock.after(textBlock);
        }

        function handleEditBlockImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showToast('图片不能超过2MB', 'error');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = input.closest('.block-image-upload').querySelector('.block-image-preview');
                preview.innerHTML = `<img src="${e.target.result}" alt="预览">`;
                preview.dataset.src = e.target.result;
                input.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function removeEditBlock(btn) {
            const block = btn.closest('.content-block');
            const editor = document.getElementById('editBlockEditor');
            const prev = block.previousElementSibling;
            const next = block.nextElementSibling;
            if (prev && next && prev.dataset.type === 'text' && next.dataset.type === 'text') {
                const prevTA = prev.querySelector('textarea');
                const nextTA = next.querySelector('textarea');
                prevTA.value = prevTA.value + '\n' + nextTA.value;
                next.remove();
            }
            block.remove();
        }

        function getEditContentBlocks() {
            const editor = document.getElementById('editBlockEditor');
            const blocks = editor.querySelectorAll('.content-block');
            const result = [];
            blocks.forEach(b => {
                if (b.dataset.type === 'text') {
                    const val = b.querySelector('textarea').value.trim();
                    if (val) result.push({ type: 'text', value: val });
                } else if (b.dataset.type === 'image') {
                    const preview = b.querySelector('.block-image-preview');
                    const src = preview?.dataset?.src;
                    if (src) result.push({ type: 'image', value: src });
                }
            });
            return result;
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function handleEditFileSelect(event) {
            const files = Array.from(event.target.files);
            if (editImages.length + files.length > 9) {
                showToast('最多9张图片', 'error');
                event.target.value = '';
                return;
            }
            files.forEach(file => {
                if (file.size > 2 * 1024 * 1024) {
                    showToast(`图片 ${file.name} 超过2MB，已跳过`, 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    editImages.push(e.target.result);
                    renderEditPreviews();
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        function removeEditImage(index) {
            editImages.splice(index, 1);
            renderEditPreviews();
        }

        function renderEditPreviews() {
            const container = document.getElementById('editImagePreviewList');
            container.innerHTML = editImages.map((img, i) => `
                <div class="image-preview">
                    <img src="${img}" alt="预览">
                    <button type="button" class="preview-remove" onclick="removeEditImage(${i})">&#10005;</button>
                </div>
            `).join('');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const contentBlocks = getEditContentBlocks();
            if (contentBlocks.length === 0) {
                showToast('请填写内容', 'error');
                return;
            }
            const data = {
                title: document.getElementById('editTitle').value.trim(),
                location: document.getElementById('editLocation').value.trim(),
                category: document.getElementById('editCategory').value,
                region: document.getElementById('editProvince').value,
                season: document.getElementById('editSeason').value,
                images: editImages,
                content: JSON.stringify(contentBlocks)
            };
            if (!data.title || !data.location || !data.category) {
                showToast('请填写必填项', 'error');
                return;
            }
            try {
                await API.updatePost(postId, data);
                showToast('更新成功', 'success');
                closeEditModal();
                loadPost();
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        let replyTo = null;

        function setReply(commentId, nickname) {
            replyTo = commentId;
            document.getElementById('replyHint').style.display = 'flex';
            document.getElementById('replyHintText').textContent = '回复 @' + nickname;
            document.getElementById('commentInput').focus();
        }

        function cancelReply() {
            replyTo = null;
            document.getElementById('replyHint').style.display = 'none';
        }

        let commentImageData = null;

        function handleCommentImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showToast('图片不能超过2MB', 'error');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                commentImageData = e.target.result;
                document.getElementById('commentImagePreview').innerHTML = `
                    <img src="${commentImageData}" alt="预览">
                    <button type="button" onclick="removeCommentImage()">&#10005;</button>
                `;
            };
            reader.readAsDataURL(file);
        }

        function removeCommentImage() {
            commentImageData = null;
            document.getElementById('commentImagePreview').innerHTML = '';
            document.getElementById('commentImageInput').value = '';
        }

        function renderCommentContent(content) {
            try {
                const parsed = JSON.parse(content);
                if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                    let html = '';
                    if (parsed.text) html += `<p class="comment-text">${escapeHtml(parsed.text)}</p>`;
                    if (parsed.image) html += `<img class="comment-image" src="${escapeHtml(parsed.image)}" alt="评论图片">`;
                    return html;
                }
            } catch {}
            return `<p class="comment-text">${escapeHtml(content)}</p>`;
        }

        async function loadComments() {
            try {
                const comments = await API.getComments(postId);
                const list = document.getElementById('commentsList');
                const isLoggedIn = Auth.isLoggedIn();
                if (comments.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted);padding:12px 0;">暂无评论，来说两句吧</p>';
                } else {
                    list.innerHTML = comments.map(c => `
                        <div class="comment-item">
                            <div class="comment-header">
                                <span class="comment-author">${escapeHtml(c.nickname || c.username)}</span>
                                ${c.reply_to_nickname ? `<span class="comment-reply-tag">回复 @${escapeHtml(c.reply_to_nickname)}</span>` : ''}
                                <span class="comment-time">${formatTime(c.created_at)}</span>
                            </div>
                            ${renderCommentContent(c.content)}
                            ${isLoggedIn ? `<button class="comment-reply-btn" onclick="setReply(${c.id}, '${escapeHtml(c.nickname || c.username)}')">回复</button>` : ''}
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to load comments', err);
            }
        }

        if (Auth.isLoggedIn()) {
            document.getElementById('commentForm').style.display = 'block';
        }

        document.getElementById('commentBtn').addEventListener('click', async () => {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text && !commentImageData) return;

            let content;
            if (commentImageData) {
                content = JSON.stringify({ text: text, image: commentImageData });
            } else {
                content = text;
            }

            try {
                await API.addComment(postId, content, replyTo);
                input.value = '';
                removeCommentImage();
                cancelReply();
                loadComments();
                showToast('评论成功', 'success');
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        document.getElementById('commentInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('commentBtn').click();
            }
        });

        loadPost();
    </script>
</body>
</html>
