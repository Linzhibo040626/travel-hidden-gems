<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布推荐 - 别处游</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.svg" alt="别处游" class="nav-logo-img">
            <span class="nav-logo-text">别处游</span>
        </a>
        <div class="nav-search">
            <input type="text" placeholder="搜索目的地、攻略...">
        </div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <div class="create-container">
        <h2>分享你的秘境发现</h2>
        <form id="createForm">
            <div class="form-group">
                <label for="title">标题</label>
                <input type="text" id="title" required placeholder="给你的推荐起个吸引人的标题" maxlength="50">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="location">地点</label>
                    <input type="text" id="location" required placeholder="具体地点名称">
                </div>
                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category" required>
                        <option value="">请选择分类</option>
                        <option value="小众景点">小众景点</option>
                        <option value="大众景点的小众去处">大众景点的小众去处</option>
                        <option value="避峰攻略">避峰攻略</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="province">省份</label>
                    <select id="province" required>
                        <option value="">请选择省份</option>
                        <option value="北京">北京</option>
                        <option value="天津">天津</option>
                        <option value="上海">上海</option>
                        <option value="重庆">重庆</option>
                        <option value="河北">河北</option>
                        <option value="山西">山西</option>
                        <option value="辽宁">辽宁</option>
                        <option value="吉林">吉林</option>
                        <option value="黑龙江">黑龙江</option>
                        <option value="江苏">江苏</option>
                        <option value="浙江">浙江</option>
                        <option value="安徽">安徽</option>
                        <option value="福建">福建</option>
                        <option value="江西">江西</option>
                        <option value="山东">山东</option>
                        <option value="河南">河南</option>
                        <option value="湖北">湖北</option>
                        <option value="湖南">湖南</option>
                        <option value="广东">广东</option>
                        <option value="广西">广西</option>
                        <option value="海南">海南</option>
                        <option value="四川">四川</option>
                        <option value="贵州">贵州</option>
                        <option value="云南">云南</option>
                        <option value="西藏">西藏</option>
                        <option value="陕西">陕西</option>
                        <option value="甘肃">甘肃</option>
                        <option value="青海">青海</option>
                        <option value="宁夏">宁夏</option>
                        <option value="新疆">新疆</option>
                        <option value="内蒙古">内蒙古</option>
                        <option value="台湾">台湾</option>
                        <option value="香港">香港</option>
                        <option value="澳门">澳门</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="season">适合季节</label>
                    <select id="season">
                        <option value="">请选择季节</option>
                        <option value="春季">春季</option>
                        <option value="夏季">夏季</option>
                        <option value="秋季">秋季</option>
                        <option value="冬季">冬季</option>
                        <option value="四季皆宜">四季皆宜</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>图片（最多9张）</label>
                <div class="image-upload-area">
                    <div class="image-upload-options">
                        <label class="upload-tab active" id="tabLocal" onclick="switchTab('local')">本地上传</label>
                        <label class="upload-tab" id="tabUrl" onclick="switchTab('url')">图片链接</label>
                    </div>
                    <div id="localUpload">
                        <input type="file" id="imageFile" accept="image/*" multiple onchange="handleFileSelect(event)">
                        <div class="image-preview-list" id="imagePreviewList"></div>
                    </div>
                    <div id="urlUpload" style="display:none;">
                        <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg（多个链接用换行分隔）">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>详细介绍</label>
                <div class="content-block-editor" id="blockEditor">
                    <div class="content-block" data-type="text">
                        <textarea placeholder="分享你的旅行体验、交通方式、注意事项等..." rows="4"></textarea>
                        <button type="button" class="insert-image-btn" onclick="insertImageBlock(this)">+ 插入图片</button>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">发布推荐</button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) {
            showToast('请先登录', 'error');
            setTimeout(() => window.location.href = 'login.html', 1000);
        }
        Auth.updateNav();

        let uploadedImages = [];

        function switchTab(tab) {
            document.getElementById('tabLocal').classList.toggle('active', tab === 'local');
            document.getElementById('tabUrl').classList.toggle('active', tab === 'url');
            document.getElementById('localUpload').style.display = tab === 'local' ? 'block' : 'none';
            document.getElementById('urlUpload').style.display = tab === 'url' ? 'block' : 'none';
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (uploadedImages.length + files.length > 9) {
                showToast('最多上传9张图片', 'error');
                event.target.value = '';
                return;
            }
            files.forEach(file => {
                if (file.size > 2 * 1024 * 1024) {
                    showToast(`图片 ${file.name} 超过2MB，已跳过`, 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages.push(e.target.result);
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreviews();
        }

        function renderImagePreviews() {
            const container = document.getElementById('imagePreviewList');
            container.innerHTML = uploadedImages.map((img, i) => `
                <div class="image-preview">
                    <img src="${img}" alt="预览">
                    <button type="button" class="preview-remove" onclick="removeImage(${i})">&#10005;</button>
                </div>
            `).join('');
        }

        function getImages() {
            if (document.getElementById('localUpload').style.display !== 'none' && uploadedImages.length > 0) {
                return uploadedImages;
            }
            const urlVal = document.getElementById('imageUrl').value.trim();
            if (urlVal) {
                return urlVal.split('\n').map(u => u.trim()).filter(u => u);
            }
            return [];
        }

        function insertImageBlock(btn) {
            const currentBlock = btn.closest('.content-block');
            const newImageBlock = document.createElement('div');
            newImageBlock.className = 'content-block';
            newImageBlock.dataset.type = 'image';
            newImageBlock.innerHTML = `
                <div class="block-image-upload">
                    <input type="file" accept="image/*" onchange="handleBlockImage(this)">
                    <div class="block-image-preview"></div>
                </div>
                <button type="button" class="block-remove-btn" onclick="removeBlock(this)">删除图片</button>
            `;
            const newTextBlock = document.createElement('div');
            newTextBlock.className = 'content-block';
            newTextBlock.dataset.type = 'text';
            newTextBlock.innerHTML = `
                <textarea placeholder="继续输入文字..." rows="4"></textarea>
                <button type="button" class="insert-image-btn" onclick="insertImageBlock(this)">+ 插入图片</button>
            `;
            currentBlock.after(newImageBlock);
            newImageBlock.after(newTextBlock);
        }

        function handleBlockImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                showToast('图片不能超过2MB', 'error');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = input.closest('.block-image-upload').querySelector('.block-image-preview');
                preview.innerHTML = `<img src="${e.target.result}" alt="预览">`;
                preview.dataset.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function removeBlock(btn) {
            const block = btn.closest('.content-block');
            const editor = document.getElementById('blockEditor');
            const blocks = editor.querySelectorAll('.content-block');
            // merge adjacent text blocks if removing image between them
            const prev = block.previousElementSibling;
            const next = block.nextElementSibling;
            if (prev && next && prev.dataset.type === 'text' && next.dataset.type === 'text') {
                const prevTA = prev.querySelector('textarea');
                const nextTA = next.querySelector('textarea');
                prevTA.value = prevTA.value + '\n' + nextTA.value;
                next.remove();
            }
            block.remove();
        }

        function getContentBlocks() {
            const editor = document.getElementById('blockEditor');
            const blocks = editor.querySelectorAll('.content-block');
            const result = [];
            blocks.forEach(b => {
                if (b.dataset.type === 'text') {
                    const val = b.querySelector('textarea').value.trim();
                    if (val) result.push({ type: 'text', value: val });
                } else if (b.dataset.type === 'image') {
                    const preview = b.querySelector('.block-image-preview');
                    const src = preview?.dataset?.src;
                    if (src) result.push({ type: 'image', value: src });
                }
            });
            return result;
        }

        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const images = getImages();
            const contentBlocks = getContentBlocks();

            if (contentBlocks.length === 0) {
                showToast('请填写内容', 'error');
                return;
            }

            const data = {
                title: document.getElementById('title').value.trim(),
                location: document.getElementById('location').value.trim(),
                category: document.getElementById('category').value,
                region: document.getElementById('province').value,
                season: document.getElementById('season').value,
                images: images,
                content: JSON.stringify(contentBlocks)
            };

            if (!data.title || !data.location || !data.category || !data.region) {
                showToast('请填写必填项', 'error');
                return;
            }

            try {
                await API.createPost(data);
                showToast('发布成功！', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
